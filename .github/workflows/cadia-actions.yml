name: Cadia quality checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: cadia-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: npm test

      - name: Check dependency cycles
        run: npm run check:cycles

      - name: Check whitespace errors
        run: git diff --check
